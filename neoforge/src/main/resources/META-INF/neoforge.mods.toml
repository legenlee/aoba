modLoader = "javafml"
loaderVersion = "[1,)"
license = "LGPL-3.0-only"
issueTrackerURL = "https://github.com/FabricMC/fabric-example-mod"

[[mods]]
modId = "aoba"
version = "${version}"
displayName = "Aoba"
authors = "Me!"
description = '''
This is an example description! Tell everyone what your mod is about!
'''
logoFile = "assets/aoba/icon.png"

[[dependencies.aoba]]
modId = "neoforge"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.aoba]]
modId = "minecraft"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.aoba]]
modId = "architectury"
type = "required"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

# Client-only mixins (the config's mixins live under the "client" key, so the Mixin
# library applies them on the client only). The GraphicsBootstrapper early service lives
# in a separate companion jar so this jar is processed as a normal mod and these are read.
[[mixins]]
config = "aoba.client.mixins.json"
