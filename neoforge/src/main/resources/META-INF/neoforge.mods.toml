modLoader = "javafml"
loaderVersion = "[1,)"
license = "LGPL-3.0-only"
issueTrackerURL = "https://github.com/LegenLee/aoba/issues"

[[mods]]
modId = "aoba"
version = "${version}"
displayName = "Aoba"
authors = "LegenLee"
displayURL = "https://github.com/LegenLee/aoba"
description = '''
Client-side IME support for Minecraft on Linux (X11 / XWayland): type Korean / Japanese /
Chinese in-game, with composition shown inline.
'''
logoFile = "assets/aoba/icon.png"

[[dependencies.aoba]]
modId = "neoforge"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.aoba]]
modId = "minecraft"
type = "required"
versionRange = "[26.2,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.aoba]]
modId = "architectury"
type = "required"
versionRange = "*"
ordering = "AFTER"
side = "BOTH"

# Client-only mixins (the config's mixins live under the "client" key, so the Mixin
# library applies them on the client only). The GraphicsBootstrapper early service lives
# in a separate companion jar so this jar is processed as a normal mod and these are read.
[[mixins]]
config = "aoba.client.mixins.json"
